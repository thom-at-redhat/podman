---
- name: Stat XDG_RUNTIME_DIR
  stat:
    path: "{{ __podman_kube_parsed.xdg_runtime_dir }}"
  register: __podman_xdg_stat
  when:
    - __podman_kube_parsed.rootless | bool
    - __podman_kube_parsed.xdg_runtime_dir | d("") | length > 0

- name: Stop and disable service
  systemd:
    name: "{{ __podman_kube_parsed.service_name }}"
    scope: "{{ __podman_kube_parsed.systemd_scope }}"
    state: stopped
    enabled: false
  become: "{{ __podman_kube_parsed.rootless | ternary(true, omit) }}"
  become_user: "{{ __podman_kube_parsed.rootless | ternary(__podman_kube_parsed.user, omit) }}"
  environment:
    XDG_RUNTIME_DIR: "{{ __podman_kube_parsed.xdg_runtime_dir }}"
  register: __podman_service_status
  when:
    - __podman_is_booted
    - not __podman_kube_parsed.rootless or __podman_xdg_stat.stat.exists
  failed_when:
    - __podman_service_status is failed
    - not __podman_service_status.stdout is search(__service_error)
  vars:
    __service_error: Could not find the requested service

- name: Check if kube file exists
  stat:
    path: "{{ __podman_kube_parsed.kube_file }}"
  register: __podman_kube_file_stat

# NOTE: removing kube specs is not idempotent and will give an error on
# RHEL 8.8 and 9.2 - seems ok on other platforms - this was fixed in the
# module but is not released yet (as of 20241024)
# https://github.com/containers/ansible-podman-collections/pull/863/files#diff-6672fb7f52e2bec3450c2dd7ed9a4385accd9bab8429ea6eecf4d56447f5a1b8R304
# remove this hack when the fix is available
- name: Remove pod/containers
  containers.podman.podman_play: "{{ __podman_kube_parsed.kube_spec |
    combine({'kube_file': __podman_kube_parsed.kube_file}) }}"
  environment:
    XDG_RUNTIME_DIR: "{{ __podman_kube_parsed.xdg_runtime_dir }}"
  become: "{{ __podman_kube_parsed.rootless | ternary(true, omit) }}"
  become_user: "{{ __podman_kube_parsed.rootless | ternary(__podman_kube_parsed.user, omit) }}"
  register: __podman_removed
  failed_when:
    - __podman_removed is failed
    - not __podman_removed.msg is search(__err_msg)
    - not __is_affected_platform
  when:
    - __podman_is_booted
    - not __podman_kube_parsed.rootless or __podman_xdg_stat.stat.exists
    - __podman_kube_file_stat.stat.exists
  vars:
    __err_msg: Failed to delete .* with {{ __podman_kube_parsed.kube_file }}
    __is_affected_platform: "{{ ansible_facts['distribution'] == 'RedHat' and
      ansible_facts['distribution_version'] in ['8.8', '9.2'] }}"

# The output of podman kube down --force looks like this:
# Pods removed:
# xxxx
# ...
# Secrets removed:
# xxxx
# ...
# Volumes removed:
# xxxx
# ...
# if nothing is listed under the "removed:" heading, then nothing was removed
- name: Remove volumes associated with pod/containers removed above
  command: podman kube down --force {{ __podman_kube_parsed.kube_file | quote }}
  environment:
    XDG_RUNTIME_DIR: "{{ __podman_kube_parsed.xdg_runtime_dir }}"
  become: "{{ __podman_kube_parsed.rootless | ternary(true, omit) }}"
  become_user: "{{ __podman_kube_parsed.rootless | ternary(__podman_kube_parsed.user, omit) }}"
  register: __podman_removed_force
  when:
    - __podman_is_booted
    - not __podman_kube_parsed.rootless or __podman_xdg_stat.stat.exists
    - __podman_kube_file_stat.stat.exists
  changed_when: >
    __podman_removed_force.stdout is search(
      '(?m)removed:\n(?!\s*$)(?![^\n]*removed:\s*$)[^\n]+'
    )

- name: Remove kubernetes yaml file
  file:
    path: "{{ __podman_kube_parsed.kube_file }}"
    state: absent

- name: Prune images no longer in use
  command: podman image prune -f
  environment:
    XDG_RUNTIME_DIR: "{{ __podman_kube_parsed.xdg_runtime_dir }}"
  become: "{{ __podman_kube_parsed.rootless | ternary(true, omit) }}"
  become_user: "{{ __podman_kube_parsed.rootless | ternary(__podman_kube_parsed.user, omit) }}"
  when:
    - __podman_is_booted
    - __podman_removed is changed  # noqa no-handler
  changed_when: true

- name: Manage linger
  include_tasks: manage_linger.yml
  vars:
    __podman_linger_user: "{{ __podman_kube_parsed.user }}"
    __podman_linger_rootless: "{{ __podman_kube_parsed.rootless }}"
    __podman_linger_item_state: absent
